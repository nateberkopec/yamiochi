version: "3.9"

# This is a practical single-host Fabro deployment sketch for the remote,
# autonomous Yamiochi factory.
#
# - Fabro itself is the control plane.
# - Admin/API access stays on the private Tailscale interface.
# - Public ingress is handled separately by Caddy and should expose only
#   POST /api/v1/webhooks/github.
# - Heavy benchmark work runs on the heavyweight self-hosted GitHub runner.

services:
  fabro:
    image: ghcr.io/fabro-sh/fabro:nightly
    user: "0:0"
    restart: unless-stopped
    env_file:
      - .env.runtime
      - .env.server
    environment:
      PORT: "32276"
    command:
      - sh
      - -c
      - exec fabro server start --foreground --bind 0.0.0.0:${PORT:-32276} --config /config/settings.toml
    volumes:
      - fabro-storage:/storage
      - ./config:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:32276:32276"

  github-runner-fast:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-fast
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-fast
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-fast-data:/tmp/github-runner

  github-runner-heavy:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-heavy
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-heavy
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-heavy-data:/tmp/github-runner

volumes:
  fabro-storage:
  github-runner-fast-data:
  github-runner-heavy-data:
