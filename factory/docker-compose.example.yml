name: yamiochi-factory

# This is a deployment sketch for the remote/autonomous factory.
# A practical single-host deployment may colocate the control plane,
# lightweight agent runners, and self-hosted GitHub Actions runners.
# The benchmark-runner profile is deployed separately on our reference benchmark hardware.

x-runner-base: &runner-base
  image: ghcr.io/example/yamiochi-factory-runner:latest
  init: true
  restart: unless-stopped
  working_dir: /workspace/repo
  environment:
    REPO_URL: ${REPO_URL}
    DATABASE_URL: postgres://factory:factory@postgres:5432/factory
    ARTIFACTS_DIR: /artifacts
    GITHUB_TOKEN: ${GITHUB_TOKEN}
    MODEL_API_KEY: ${MODEL_API_KEY}
  volumes:
    - repo-cache:/workspace
    - artifacts:/artifacts

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  fabro:
    <<: *runner-base
    command: ["mise", "run", "factory:control-plane"]
    depends_on:
      - postgres
      - minio

  agent-runner:
    <<: *runner-base
    command: ["mise", "run", "factory:agent-worker"]
    depends_on:
      - postgres
      - minio
    # Keep these lightweight: authoring + fast local checks only.
    # Scale horizontally, e.g.:
    # docker compose up --scale agent-runner=3

  github-runner-fast:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-fast
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-fast
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-fast-data:/tmp/github-runner

  github-runner-heavy:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-heavy
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-heavy
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-heavy-data:/tmp/github-runner

  judge:
    <<: *runner-base
    command: ["mise", "run", "factory:judge-worker"]
    depends_on:
      - postgres
      - minio

  scenario-gates:
    <<: *runner-base
    command: ["mise", "run", "factory:scenario-worker"]
    depends_on:
      - postgres
      - minio

  benchmark-dispatcher:
    <<: *runner-base
    command: ["mise", "run", "factory:benchmark-dispatcher"]
    depends_on:
      - postgres
      - minio
    environment:
      REPO_URL: ${REPO_URL}
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory
      ARTIFACTS_DIR: /artifacts
      BENCHMARK_HOST: ${BENCHMARK_HOST}
      BENCHMARK_SSH_USER: ${BENCHMARK_SSH_USER:-ec2-user}
      BENCHMARK_SSH_KEY_PATH: ${BENCHMARK_SSH_KEY_PATH:-/run/secrets/benchmark_ssh_key}

  release-runner:
    <<: *runner-base
    profiles: ["release"]
    command: ["mise", "run", "factory:release-worker"]
    depends_on:
      - postgres
      - minio

  benchmark-runner:
    <<: *runner-base
    profiles: ["benchmark-host"]
    command: ["mise", "run", "bench"]
    # Deploy this profile only on our reference benchmark hardware.
    # Do not run it on the same machine as fabro or the agent workers.

volumes:
  postgres-data:
  minio-data:
  repo-cache:
  artifacts:
  github-runner-fast-data:
  github-runner-heavy-data:
