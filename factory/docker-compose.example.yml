version: "3.9"

# This is a practical single-host Fabro deployment sketch for the remote,
# autonomous Yamiochi factory.
#
# - Fabro itself is the control plane.
# - Admin/API access stays on the private Tailscale interface.
# - Public ingress is handled separately by Caddy and should expose only
#   POST /api/v1/webhooks/github.
# - Heavy benchmark work runs on the heavyweight self-hosted GitHub runner.
# - A lightweight autopilot process selects work, creates disposable worktrees,
#   runs Fabro, opens PRs, watches CI, merges green diffs, and promotes merge
#   gate baselines.

services:
  fabro:
    image: ghcr.io/fabro-sh/fabro:nightly
    user: "0:0"
    restart: unless-stopped
    env_file:
      - .env.runtime
      - .env.server
    environment:
      PORT: "32276"
    command:
      - sh
      - -c
      - exec fabro server start --foreground --bind 0.0.0.0:${PORT:-32276} --config /config/settings.toml
    volumes:
      - fabro-storage:/storage
      - ./config:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:32276:32276"

  factory-autopilot:
    image: fabro-agent:latest
    restart: unless-stopped
    depends_on:
      - fabro
    env_file:
      - .env.server
    environment:
      FABRO_SERVER: http://fabro:32276
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GH_TOKEN: ${GITHUB_TOKEN}
      GITHUB_REPOSITORY: nateberkopec/yamiochi
      YAMIOCHI_FACTORY_REPOSITORY: nateberkopec/yamiochi
      YAMIOCHI_FACTORY_BASELINE_FILE: /var/lib/yamiochi-factory/baselines/merge-gates.json
      YAMIOCHI_FACTORY_ATTEMPTS_FILE: /var/lib/yamiochi-factory/baselines/autopilot-attempts.json
      YAMIOCHI_FACTORY_WORKTREE_ROOT: /var/lib/yamiochi-factory/worktrees
      YAMIOCHI_FACTORY_FAILURE_THRESHOLD: "1"
      YAMIOCHI_FACTORY_FAILURE_COOLDOWN_SECONDS: "900"
    command:
      - bash
      - -lc
      - |
        cd /var/lib/yamiochi-factory/repos/yamiochi
        while true; do
          ruby factory/scripts/autopilot.rb --once || true
          sleep 30
        done
    volumes:
      - /var/lib/yamiochi-factory:/var/lib/yamiochi-factory
      - /var/lib/yamiochi-factory/fabro-home-remote:/root/.fabro

  github-runner-fast:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-fast
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-fast
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-fast-data:/tmp/github-runner

  github-runner-heavy:
    image: ghcr.io/myoung34/docker-github-actions-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GITHUB_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: yamiochi-factory-heavy
      RUNNER_SCOPE: repo
      RUN_AS_ROOT: "true"
      LABELS: self-hosted,linux,x64,factory-heavy
      DISABLE_AUTO_UPDATE: "1"
      EPHEMERAL: "1"
      RUNNER_WORKDIR: /tmp/github-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-heavy-data:/tmp/github-runner

volumes:
  fabro-storage:
  github-runner-fast-data:
  github-runner-heavy-data:
