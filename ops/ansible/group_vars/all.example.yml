factory_root: /opt/yamiochi-factory
factory_state_root: /var/lib/yamiochi-factory
factory_compose_project_name: yamiochi-factory
factory_runtime_env_local_path: "{{ playbook_dir }}/../.secrets/factory.env"

factory_repo_url: https://github.com/nateberkopec/yamiochi.git
factory_repo_ref: main
factory_repo_checkout_path: "{{ factory_state_root }}/repos/yamiochi"
factory_fabro_image: ghcr.io/fabro-sh/fabro:nightly
factory_sandbox_image: fabro-agent:latest
factory_sandbox_base_image: ruby:3.3-bookworm
factory_github_runner_image: myoung34/github-runner:latest

factory_resources:
  fabro:
    cpus: 2
    mem_limit: 4g
  github_runner_fast:
    cpus: 1
    mem_limit: 3g
  github_runner_heavy:
    cpus: 3
    mem_limit: 16g

factory_model:
  provider: openai
  name: gpt-5.4

factory_fabro:
  listen_port: 32276
  max_concurrent_runs: 3

factory_private_ui_domain: yamiochi-factory-1.tail6cc978.ts.net
factory_web_origin: https://yamiochi-factory-1.tail6cc978.ts.net

factory_public_ingress:
  enabled: true
  domain: fabro-hooks.speedshop.co
  webhook_path: /api/v1/webhooks/github

factory_github_app:
  enabled: true
  app_id: "3473890"
  client_id: Iv23limou6Y3ymBMg9C1
  slug: yamiochi-factory

factory_tailscale:
  hostname: yamiochi-factory
  enable_ssh: true
