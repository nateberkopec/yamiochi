---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - factory_runtime_env_local_path | length > 0
      - factory_fabro_image | length > 0
      - factory_sandbox_image | length > 0
      - factory_sandbox_base_image | length > 0
      - factory_local_env.OPENAI_API_KEY is defined
      - factory_local_env.OPENAI_API_KEY | length > 0
      - factory_local_env.GITHUB_APP_CLIENT_SECRET is defined
      - factory_local_env.GITHUB_APP_CLIENT_SECRET | length > 0
      - factory_local_env.GITHUB_APP_WEBHOOK_SECRET is defined
      - factory_local_env.GITHUB_APP_WEBHOOK_SECRET | length > 0
      - factory_local_env.GITHUB_APP_PRIVATE_KEY is defined
      - factory_local_env.GITHUB_APP_PRIVATE_KEY | length > 0
    fail_msg: Fill in ops/ansible/group_vars/all.yml and the local fnox-backed env before deploying.

- name: Create factory directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ factory_root }}/config"
    - "{{ factory_root }}/sandbox-image"
    - "{{ factory_state_root }}"
    - "{{ factory_state_root }}/baselines"
    - "{{ factory_state_root }}/fabro-storage"
    - "{{ factory_state_root }}/repos"
    - "{{ factory_state_root }}/worktrees"

- name: Checkout factory repository mirror
  ansible.builtin.git:
    repo: "{{ factory_repo_url }}"
    dest: "{{ factory_repo_checkout_path }}"
    version: "{{ factory_repo_ref }}"
    force: true
    update: true

- name: Render Fabro settings.toml
  ansible.builtin.template:
    src: settings.toml.j2
    dest: "{{ factory_root }}/config/settings.toml"
    owner: root
    group: root
    mode: "0644"

- name: Render Fabro server env
  ansible.builtin.template:
    src: fabro-server.env.j2
    dest: "{{ factory_root }}/.env.server"
    owner: root
    group: root
    mode: "0600"

- name: Render Fabro sandbox Dockerfile
  ansible.builtin.template:
    src: fabro-sandbox.Dockerfile.j2
    dest: "{{ factory_root }}/sandbox-image/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Build Fabro sandbox image
  ansible.builtin.command:
    cmd: >-
      docker build --pull --tag {{ factory_sandbox_image }} {{ factory_root }}/sandbox-image
  changed_when: true

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ factory_root }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Render compose wrapper
  ansible.builtin.template:
    src: compose-wrapper.sh.j2
    dest: /usr/local/bin/yamiochi-factory-compose
    owner: root
    group: root
    mode: "0755"

- name: Copy runtime env file to host
  ansible.builtin.copy:
    src: "{{ factory_runtime_env_local_path }}"
    dest: "{{ factory_root }}/.env.runtime"
    owner: root
    group: root
    mode: "0600"

- name: Render systemd unit
  ansible.builtin.template:
    src: yamiochi-factory.service.j2
    dest: /etc/systemd/system/yamiochi-factory.service
    owner: root
    group: root
    mode: "0644"

- name: Start GitHub runner compose stack
  ansible.builtin.command:
    cmd: >-
      docker compose --project-name {{ factory_compose_project_name }}
      --env-file {{ factory_root }}/.env.runtime
      up -d --remove-orphans
    chdir: "{{ factory_root }}"
  changed_when: true

- name: Enable and start Fabro service
  ansible.builtin.systemd:
    name: yamiochi-factory.service
    enabled: true
    state: restarted
    daemon_reload: true
