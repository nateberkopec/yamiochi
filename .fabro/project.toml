_version = 1

[run.model]
provider = "openai"
name = "gpt-5.4"

[run.sandbox]
provider = "docker"
preserve = false

[run.sandbox.env]
GITHUB_TOKEN = "$GITHUB_TOKEN"
GH_TOKEN = "$GH_TOKEN"
GITHUB_REPOSITORY = "$GITHUB_REPOSITORY"
YAMIOCHI_FACTORY_REPOSITORY = "$YAMIOCHI_FACTORY_REPOSITORY"
YAMIOCHI_FACTORY_BASELINE_FILE = "$YAMIOCHI_FACTORY_BASELINE_FILE"
YAMIOCHI_FACTORY_WORKTREE_ROOT = "$YAMIOCHI_FACTORY_WORKTREE_ROOT"

[run.scm]
owner = "nateberkopec"
repository = "yamiochi"

[run.pull_request]
enabled = true
draft = false
auto_merge = false
merge_strategy = "squash"

[run.checkpoint]
exclude_globs = ["tmp/**", "ops/ansible/.secrets/**"]

