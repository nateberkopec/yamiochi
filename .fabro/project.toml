_version = 1

[run.model]
provider = "openai"
name = "gpt-5.4"

[run.sandbox]
provider = "docker"
preserve = false

[run.sandbox.env]
GITHUB_REPOSITORY = "nateberkopec/yamiochi"
YAMIOCHI_FACTORY_REPOSITORY = "nateberkopec/yamiochi"

[run.scm]
owner = "nateberkopec"
repository = "yamiochi"

[run.pull_request]
enabled = true
draft = false
auto_merge = false
merge_strategy = "squash"

[run.checkpoint]
exclude_globs = ["tmp/**", "ops/ansible/.secrets/**"]

